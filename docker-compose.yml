services:

  # ── 1. ZooKeeper ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,srvr"
    ports:
      - "2181:2181"
    healthcheck:
      test: echo srvr | nc localhost 2181 | grep Mode || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 2. Kafka Broker ──
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list || exit 1
      interval: 15s
      timeout: 10s
      retries: 10

  # ── 3. Kafka Producer ──
  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: fraud-producer
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
    environment:
      KAFKA_BOOTSTRAP: kafka:29092

  # ── 4. Spark Streaming Consumer ──
  spark-consumer:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: fraud-spark
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
      - fraud-alerts:/app/fraud_output/alerts
      - spark-checkpoints:/app/checkpoints
    environment:
      KAFKA_BOOTSTRAP: kafka:29092

  # ── 5. Streamlit Dashboard ──
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: fraud-dashboard
    depends_on:
      - spark-consumer
    ports:
      - "8501:8501"
    volumes:
      - fraud-alerts:/app/fraud_output/alerts:ro
      - ./models:/app/models:ro
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

volumes:
  fraud-alerts:
  spark-checkpoints:
